<!DOCTYPE HTML>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Key Input Checker.</title>
  </head>
  
  <body>
    <p>Total keypresses: <span id="totalKeypresses">0</span><p>
    <p id="result"></p>
    
    
    <script>
      var totalKeypresses = 0;
      var keyCodes = {
        8: "Backspace",
        9: "Tab",
        
        
       
        13: "Enter",
        
        
        16: "Shift",
        17: "ctrl",
        18: "Alt",
        19: "Pause",
        20: "Caps Lock",
        
        
        
        
        
        
        27: "Esc",
        
        
        
        
        
        
        32: "Spacebar",
        33: "Page Up",
        34: "Page Down",
        35: "End",
        36: "Home",
        37: "Arrow Left",
        38: "Arrow Up",
        39: "Arrow Right",
        40: "Arrow Down",
        


        44: "Print Screen",
        45: "Insert",
        46: "Delete",
        
        48: "0",
        49: "1",
        50: "2",
        51: "3",
        52: "4",
        53: "5",
        54: "6",
        55: "7",
        56: "8",
        57: "9",
        58: "0",
        65: "a",
        66: "b",
        67: "c",
        68: "d",
        69: "e",
        70: "f",
        71: "g",
        72: "h",
        73: "i",
        74: "j",
        75: "k",
        76: "l",
        77: "m",
        78: "n",
        79: "o",
        80: "p",
        81: "q",
        82: "r",
        83: "s",
        84: "t",
        85: "u",
        86: "v",
        87: "w",
        88: "x",
        89: "y",
        90: "z",
       




        96: "(Numpad) 0",
        97: "(NumPad) 1",
        98: "(NumPad) 2",
        99: "(NumPad) 3",
        100: "(NumPad) 4",
        101: "(NumPad) 5",
        102: "(NumPad) 6",
        103: "(NumPad) 7",
        104: "(NumPad) 8",
        105: "(NumPad) 9",
        106: "(NumPad) *",
        107: "(NumPad) +",

        109: "(NumPad) -",
        110: "(NumPad) .",
        111: "(NumPad) /,",
        112: "F1",

        118: "F7",

        120: "F9",

        122: "F11",
        123: "F12",







        144: "Num Lock",
        145: "Scroll Lock",
      }
      
      $("body").on("keyup", function(e){
        $("#result").text("Key recognized: " + keyCodes[e.keyCode]);
        
        totalKeypresses++;
        $("#totalKeypresses").text(totalKeypresses);
      });
    </script>
  </body>
</html>
